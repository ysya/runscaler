version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
  settings:
    errcheck:
      exclude-functions:
        # Standard library: close/flush/print returns are rarely actionable.
        - (io.Closer).Close
        - (*os.File).Close
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Fprint
        - (*text/tabwriter.Writer).Flush
        - (*encoding/json.Encoder).Encode
        - os.Remove
        - os.RemoveAll
        # Third-party: viper.BindPFlag only fails on nil flag (compile-time);
        # scaleset MessageSessionClient.Close takes a context but the error
        # is informational.
        - github.com/spf13/viper.BindPFlag
        - (*github.com/docker/docker/client.Client).Close
        - (*github.com/actions/scaleset.MessageSessionClient).Close
        - (*net/http.Server).Shutdown
        - viper.ReadInConfig
    staticcheck:
      # Skip stylistic checks that don't add safety value:
      # - QF* quick-fix suggestions (e.g. QF1008 embedded field selectors)
      # - ST1000 package comment requirement (purely bureaucratic)
      checks:
        - all
        - -QF1008
        - -ST1000

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
