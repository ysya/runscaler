version: 2

builds:
  # Primary build: the `runner` binary, shipped as runner-* archives.
  - id: runner
    main: ./cmd/runner
    binary: runner
    # ldflags/goos/goarch are shared with the compat build via this anchor so
    # the two cannot drift apart.
    <<: &common_build
      ldflags:
        - -s -w
        - -X main.version={{.Version}}
        - -X main.commit={{.ShortCommit}}
        - -X main.date={{.Date}}
      goos:
        - linux
        - darwin
      goarch:
        - amd64
        - arm64

  # Transitional compat build: identical program, but the binary is named
  # `runscaler` and shipped as runscaler-* archives so an OLD `runscaler update`
  # can still fetch and extract this release. Build settings are inherited from
  # the anchor above (cannot drift). Remove once no production hosts run the old
  # `runscaler` binary — target: after the next two release cycles.
  - id: runscaler-compat
    main: ./cmd/runner
    binary: runscaler
    <<: *common_build

archives:
  # runner-{os}-{arch}.tar.gz containing the `runner` binary — what the new
  # self-update (internal/versioncheck) fetches.
  - id: runner
    ids:
      - runner
    formats:
      - tar.gz
    name_template: "runner-{{ .Os }}-{{ .Arch }}"

  # runscaler-{os}-{arch}.tar.gz containing the `runscaler` binary — what the
  # old self-update fetches during the transition.
  - id: runscaler-compat
    ids:
      - runscaler-compat
    formats:
      - tar.gz
    name_template: "runscaler-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
