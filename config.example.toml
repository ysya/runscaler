# runscaler configuration
# Copy this file to config.toml and edit as needed.

# --- Global settings ---

log-level = "info"
log-format = "text"
health-port = 8080

# --- Defaults (inherited by all scale sets unless overridden) ---

# Backend: "docker" (Linux containers) or "tart" (macOS VMs)
backend = "docker"

# Default runner image and group
runner-image = "ghcr.io/actions/actions-runner:latest"
runner-group = "default"
max-runners = 10

[docker]
socket = "/var/run/docker.sock"
dind = true
# shared-volume = "/shared"
# memory = 0     # MB, 0 = unlimited (e.g. 8192 for 8GB)
# cpu = 0        # cores, 0 = unlimited (e.g. 4)

# [tart]
# runner-dir = "/Users/admin/actions-runner"
# cpu = 0        # 0 = use image default
# memory = 0     # MB, 0 = use image default
# pool-size = 0  # pre-warmed VMs, 0 = disabled

# --- Single scale set mode ---
# Use top-level fields when managing a single org/repo.
# These are ignored when [[scaleset]] entries exist.

# url = "https://github.com/your-org"
# name = "my-runners"
# token = "ghp_xxx"
# max-runners = 10
# min-runners = 0
# labels = ["self-hosted", "linux"]

# --- Multiple scale sets mode ---
# Use [[scaleset]] entries to manage multiple orgs/repos from one process.
# Each entry inherits runner-image, runner-group, max-runners, [docker],
# and [tart] from the defaults above unless explicitly overridden.

# [[scaleset]]
# url = "https://github.com/org-a"
# name = "runners-a"
# token = "ghp_aaa"
# max-runners = 5

# [[scaleset]]
# url = "https://github.com/org-b"
# name = "runners-b"
# token = "ghp_bbb"
# runner-image = "custom-runner:latest"
# labels = ["linux", "gpu"]

# [[scaleset]]
# url = "https://github.com/org-c"
# name = "macos-runners"
# token = "env:TOKEN_ORG_C"
# backend = "tart"
# max-runners = 2
# runner-image = "ghcr.io/cirruslabs/macos-sequoia-xcode:latest"
