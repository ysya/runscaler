<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Runner Compose Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      padding: 2rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 400px 1fr;
      gap: 1.5rem;
      max-width: 1280px;
      margin: 0 auto;
    }

    .left-col {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1.5rem;
    }

    .panel h2 {
      font-size: 1rem;
      color: #8b949e;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field {
      margin-bottom: 1rem;
    }

    .field label {
      display: block;
      font-size: 0.85rem;
      color: #8b949e;
      margin-bottom: 0.3rem;
    }

    .field input, .field select {
      width: 100%;
      padding: 0.5rem 0.75rem;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 0.9rem;
      font-family: inherit;
    }

    .field input:focus, .field select:focus {
      outline: none;
      border-color: #58a6ff;
    }

    .worker-count-control {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .worker-count-control input[type="range"] {
      flex: 1;
      accent-color: #58a6ff;
    }

    .worker-count-control .count-display {
      font-size: 1.5rem;
      font-weight: bold;
      color: #58a6ff;
      min-width: 2ch;
      text-align: center;
    }

    .mono {
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace !important;
      font-size: 0.8rem !important;
    }

    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .btn-group {
      display: flex;
      gap: 0.5rem;
    }

    button {
      padding: 0.45rem 1rem;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #21262d;
      color: #e6edf3;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #30363d; }

    button.primary {
      background: #238636;
      border-color: #2ea043;
    }

    button.primary:hover { background: #2ea043; }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #238636;
      color: #fff;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 0.9rem;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    pre {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 1rem;
      overflow: auto;
      max-height: calc(100vh - 10rem);
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 0.8rem;
      line-height: 1.6;
      tab-size: 2;
      white-space: pre;
      color: #e6edf3;
    }

    /* YAML syntax highlighting */
    .hl-key { color: #79c0ff; }
    .hl-str { color: #a5d6ff; }
    .hl-bool { color: #ffa657; }
    .hl-anchor { color: #ffa657; font-weight: 600; }
    .hl-alias { color: #ffa657; font-style: italic; }
    .hl-merge { color: #d2a8ff; }
    .hl-dash { color: #ff7b72; }
    .hl-comment { color: #8b949e; font-style: italic; }
    .hl-section { color: #ff7b72; font-weight: 600; }

    .hint {
      font-size: 0.75rem;
      color: #484f58;
      margin-top: 0.25rem;
    }

    /* Per-worker settings */
    .worker-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .worker-row {
      display: grid;
      grid-template-columns: 80px 1fr;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
    }

    .worker-row.has-custom {
      border-color: #d29922;
    }

    .worker-row .worker-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: #8b949e;
      white-space: nowrap;
    }

    .worker-row input {
      width: 100%;
      padding: 0.35rem 0.5rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #e6edf3;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 0.78rem;
    }

    .worker-row input:focus {
      outline: none;
      border-color: #58a6ff;
    }

    .worker-row input::placeholder {
      color: #484f58;
    }

    .worker-section-hint {
      font-size: 0.75rem;
      color: #484f58;
      margin-bottom: 0.75rem;
    }

    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="left-col">
      <div class="panel" id="globalPanel">
        <h2>General Settings</h2>

        <div class="field">
          <label>Worker Count</label>
          <div class="worker-count-control">
            <input type="range" id="workerCount" min="1" max="20" value="3">
            <span class="count-display" id="workerCountDisplay">3</span>
          </div>
        </div>

        <div class="field">
          <label>Image</label>
          <input type="text" id="image" value="myoung34/github-runner:ubuntu-noble" class="mono">
        </div>

        <div class="field">
          <label>Runner Scope</label>
          <select id="runnerScope">
            <option value="org" selected>org</option>
            <option value="repo">repo</option>
            <option value="enterprise">enterprise</option>
          </select>
        </div>

        <div class="field">
          <label>ORG_NAME / REPO_URL</label>
          <input type="text" id="orgName" value="${ORG_NAME}" class="mono">
          <div class="hint">Use ${ORG_NAME} to read from .env</div>
        </div>

        <div class="field">
          <label>ACCESS_TOKEN</label>
          <input type="text" id="accessToken" value="${ACCESS_TOKEN}" class="mono">
          <div class="hint">Recommended: use ${ACCESS_TOKEN} with .env</div>
        </div>

        <div class="field">
          <label>Default Labels</label>
          <input type="text" id="labels" value="linux,x64,ubuntu-latest" class="mono">
        </div>

        <div class="field">
          <label>Runner Name Prefix</label>
          <input type="text" id="runnerPrefix" value="docker">
        </div>

        <div class="field">
          <label>Work Dir Base Path</label>
          <input type="text" id="workBase" value="/tmp/runner" class="mono">
        </div>

        <div class="field">
          <label>Data Dir Base Path</label>
          <input type="text" id="dataBase" value="./runner" class="mono">
        </div>

        <div class="field">
          <label>Shared Volume (Host Path)</label>
          <input type="text" id="sharedHost" value="./runner/shared" class="mono">
          <div class="hint">Leave empty to skip shared volume</div>
        </div>

        <div class="field">
          <label>Shared Volume (Container Path)</label>
          <input type="text" id="sharedContainer" value="/shared" class="mono">
        </div>

        <div class="field">
          <label>DISABLE_AUTOMATIC_DEREGISTRATION</label>
          <select id="disableDeregister">
            <option value="true" selected>true</option>
            <option value="false">false</option>
          </select>
        </div>
      </div>

      <div class="panel">
        <h2>Per-Worker Labels</h2>
        <div class="worker-section-hint">Leave empty to use default labels. Fill in to override for that worker.</div>
        <div class="worker-list" id="workerList"></div>
      </div>
    </div>

    <div class="panel">
      <div class="preview-header">
        <h2>compose.yaml Preview</h2>
        <div class="btn-group">
          <button onclick="copyYaml()">Copy YAML</button>
          <button onclick="copyShellCmd()">Copy Shell Command</button>
          <button class="primary" onclick="downloadYaml()">Download</button>
        </div>
      </div>
      <pre id="output"></pre>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const $ = (id) => document.getElementById(id);

    // Store raw YAML for copy/download
    let rawYaml = '';

    // Store per-worker custom labels
    const workerLabels = {};

    // YAML syntax highlighting: build DOM nodes line by line
    function highlightYaml(text) {
      const container = $('output');
      while (container.firstChild) {
        container.removeChild(container.firstChild);
      }

      var lines = text.split('\n');
      for (var li = 0; li < lines.length; li++) {
        if (li > 0) container.appendChild(document.createTextNode('\n'));
        var line = lines[li];
        if (!line) continue;

        var frag = document.createDocumentFragment();

        // Extract leading whitespace
        var indentMatch = line.match(/^(\s*)/);
        var indent = indentMatch ? indentMatch[1] : '';
        var rest = line.slice(indent.length);

        if (indent) frag.appendChild(document.createTextNode(indent));

        // Top-level sections (services:, x-runner-common:)
        if (indent === '' && /^[\w-]+:/.test(rest)) {
          highlightTopLevel(frag, rest);
        }
        // merge key: <<: *alias
        else if (/^<<:\s*\*/.test(rest)) {
          highlightMerge(frag, rest);
        }
        // list item: - "value"
        else if (/^-\s/.test(rest)) {
          highlightListItem(frag, rest);
        }
        // key: value
        else if (/^[\w_-]+:/.test(rest)) {
          highlightKeyValue(frag, rest);
        }
        else {
          frag.appendChild(document.createTextNode(rest));
        }

        container.appendChild(frag);
      }
    }

    function makeSpan(cls, text) {
      var s = document.createElement('span');
      s.className = cls;
      s.textContent = text;
      return s;
    }

    function highlightTopLevel(frag, text) {
      // e.g. "x-runner-common: &runner-common" or "services:"
      var parts = text.match(/^([\w-]+:)(.*)/);
      if (!parts) { frag.appendChild(document.createTextNode(text)); return; }
      frag.appendChild(makeSpan('hl-section', parts[1]));
      if (parts[2]) highlightInline(frag, parts[2]);
    }

    function highlightMerge(frag, text) {
      var parts = text.match(/^(<<:)\s*(\*[\w-]+)(.*)/);
      if (!parts) { frag.appendChild(document.createTextNode(text)); return; }
      frag.appendChild(makeSpan('hl-merge', parts[1]));
      frag.appendChild(document.createTextNode(' '));
      frag.appendChild(makeSpan('hl-alias', parts[2]));
      if (parts[3]) frag.appendChild(document.createTextNode(parts[3]));
    }

    function highlightListItem(frag, text) {
      frag.appendChild(makeSpan('hl-dash', '-'));
      var val = text.slice(1);
      if (val) highlightInline(frag, val);
    }

    function highlightKeyValue(frag, text) {
      var idx = text.indexOf(':');
      var key = text.slice(0, idx);
      var after = text.slice(idx + 1);

      frag.appendChild(makeSpan('hl-key', key));
      frag.appendChild(document.createTextNode(':'));
      if (after) highlightInline(frag, after);
    }

    function highlightInline(frag, text) {
      // anchor: &name
      var anchorMatch = text.match(/^(\s*)(&[\w-]+)(.*)/);
      if (anchorMatch) {
        if (anchorMatch[1]) frag.appendChild(document.createTextNode(anchorMatch[1]));
        frag.appendChild(makeSpan('hl-anchor', anchorMatch[2]));
        if (anchorMatch[3]) highlightInline(frag, anchorMatch[3]);
        return;
      }
      // alias: *name
      var aliasMatch = text.match(/^(\s*)(\*[\w-]+)(.*)/);
      if (aliasMatch) {
        if (aliasMatch[1]) frag.appendChild(document.createTextNode(aliasMatch[1]));
        frag.appendChild(makeSpan('hl-alias', aliasMatch[2]));
        if (aliasMatch[3]) highlightInline(frag, aliasMatch[3]);
        return;
      }
      // quoted string: "..."
      var strMatch = text.match(/^(\s*)("(?:[^"\\]|\\.)*")(.*)/);
      if (strMatch) {
        if (strMatch[1]) frag.appendChild(document.createTextNode(strMatch[1]));
        frag.appendChild(makeSpan('hl-str', strMatch[2]));
        if (strMatch[3]) highlightInline(frag, strMatch[3]);
        return;
      }
      // boolean
      var boolMatch = text.match(/^(\s+)(true|false)\s*$/);
      if (boolMatch) {
        frag.appendChild(document.createTextNode(boolMatch[1]));
        frag.appendChild(makeSpan('hl-bool', boolMatch[2]));
        return;
      }
      // plain value
      frag.appendChild(document.createTextNode(text));
    }

    function renderWorkerList() {
      const count = +$('workerCount').value;
      const defaultLabels = $('labels').value;
      const prefix = $('runnerPrefix').value;
      const container = $('workerList');

      // Safely clear child elements
      while (container.firstChild) {
        container.removeChild(container.firstChild);
      }

      for (let i = 1; i <= count; i++) {
        const row = document.createElement('div');
        row.className = 'worker-row' + (workerLabels[i] ? ' has-custom' : '');

        const name = document.createElement('span');
        name.className = 'worker-name';
        name.textContent = prefix + '-' + i;

        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = defaultLabels;
        input.value = workerLabels[i] || '';
        input.classList.add('mono');

        const workerIndex = i;
        input.addEventListener('input', function () {
          const val = this.value.trim();
          if (val) {
            workerLabels[workerIndex] = val;
            row.classList.add('has-custom');
          } else {
            delete workerLabels[workerIndex];
            row.classList.remove('has-custom');
          }
          generate();
        });

        row.appendChild(name);
        row.appendChild(input);
        container.appendChild(row);
      }
    }

    function generate() {
      const count = +$('workerCount').value;
      const image = $('image').value;
      const scope = $('runnerScope').value;
      const orgName = $('orgName').value;
      const accessToken = $('accessToken').value;
      const defaultLabels = $('labels').value;
      const prefix = $('runnerPrefix').value;
      const workBase = $('workBase').value.replace(/\/+$/, '');
      const dataBase = $('dataBase').value.replace(/\/+$/, '');
      const disableDeregister = $('disableDeregister').value;
      const sharedHost = $('sharedHost').value.trim();
      const sharedContainer = $('sharedContainer').value.trim();

      let scopeEnv;
      if (scope === 'repo') {
        scopeEnv = '    REPO_URL: ' + orgName;
      } else if (scope === 'enterprise') {
        scopeEnv = '    ENTERPRISE_NAME: ' + orgName;
      } else {
        scopeEnv = '    ORG_NAME: ' + orgName;
      }

      const lines = [
        'x-runner-common: &runner-common',
        '  image: ' + image,
        '  environment: &runner-env',
        '    ACCESS_TOKEN: ' + accessToken,
        '    CONFIGURED_ACTIONS_RUNNER_FILES_DIR: /runner/data',
        '    RUNNER_SCOPE: "' + scope + '"',
        scopeEnv,
        '    LABELS: ' + defaultLabels,
        '    DISABLE_AUTOMATIC_DEREGISTRATION: "' + disableDeregister + '"',
        '  security_opt:',
        '    - label:disable',
        '  volumes:',
        '    - "/var/run/docker.sock:/var/run/docker.sock"',
        '',
        'services:'
      ];

      for (let i = 1; i <= count; i++) {
        const svcName = prefix + '-' + i;
        const workDir = workBase + '/' + svcName + '/work';
        const customLabels = workerLabels[i];

        lines.push('  ' + svcName + ':');
        lines.push('    <<: *runner-common');
        lines.push('    environment:');
        lines.push('      <<: *runner-env');
        lines.push('      RUNNER_NAME: ' + svcName);
        lines.push('      RUNNER_WORKDIR: ' + workDir);

        if (customLabels) {
          lines.push('      LABELS: ' + customLabels);
        }

        lines.push('    volumes:');
        lines.push('      - "/var/run/docker.sock:/var/run/docker.sock"');
        lines.push('      - "' + dataBase + '/' + svcName + '/data:/runner/data"');
        lines.push('      - "' + workDir + ':' + workDir + '"');

        if (sharedHost && sharedContainer) {
          lines.push('      - "' + sharedHost + ':' + sharedContainer + '"');
        }

        lines.push('');
      }

      rawYaml = lines.join('\n');
      highlightYaml(rawYaml);
    }

    function showToast(msg) {
      const toast = $('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(function () { toast.classList.remove('show'); }, 2000);
    }

    function copyYaml() {
      navigator.clipboard.writeText(rawYaml).then(function () {
        showToast('Copied to clipboard!');
      });
    }

    function copyShellCmd() {
      var cmd = "cat > compose.yaml << 'COMPOSE_EOF'\n" + rawYaml + "COMPOSE_EOF";
      navigator.clipboard.writeText(cmd).then(function () {
        showToast('Shell command copied!');
      });
    }

    function downloadYaml() {
      const blob = new Blob([rawYaml], { type: 'text/yaml' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'compose.yaml';
      a.click();
      URL.revokeObjectURL(a.href);
      showToast('compose.yaml downloaded!');
    }

    // Bind real-time updates for global settings panel
    $('globalPanel').addEventListener('input', function (e) {
      const el = e.target;
      if (el.id === 'workerCount') {
        $('workerCountDisplay').textContent = el.value;
        renderWorkerList();
      }
      generate();
    });

    // Initial render
    renderWorkerList();
    generate();
  </script>
</body>
</html>
